# Coauthor disambiguation for bibliography rendering.
# Maps last names to first name variants and profile URLs.
# Used by jekyll-scholar to auto-link coauthor names in publications.
#
# Format:
# "lastname":
#   - firstname: ["Full Name", "Abbreviated", ...]
#     url: https://...
#
# Add entries for coauthors who have multiple name variants in BibTeX
# or whose names should link to a profile page.
